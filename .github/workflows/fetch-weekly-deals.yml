name: Fetch Weekly Deals

on:
  schedule:
    - cron: '0 10 * * 3'
  workflow_dispatch:
    inputs:
      location_id:
        description: 'Override King Soopers location ID'
        required: false
        type: string

jobs:
  fetch-deals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Fetch weekly deals
        run: node ./scripts/fetch-weekly-deals.mjs
        env:
          KROGER_CLIENT_ID: ${{ secrets.KROGER_CLIENT_ID }}
          KROGER_CLIENT_SECRET: ${{ secrets.KROGER_CLIENT_SECRET }}
          KROGER_LOCATION_ID: ${{ inputs.location_id || secrets.KROGER_LOCATION_ID }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/weekly-deals.json || (
            git add data/weekly-deals.json &&
            git commit -m "chore: update weekly deals [skip ci]" &&
            git push
          )
