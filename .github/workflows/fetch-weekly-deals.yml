name: Fetch Weekly Deals

on:
  schedule:
    - cron: '0 10 * * 3'
  workflow_dispatch:
    inputs:
      location_id:
        description: 'Override King Soopers location ID'
        required: false
        type: string

jobs:
  fetch-deals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Fetch weekly deals
        run: node ./scripts/fetch-weekly-deals.mjs
        env:
          KROGER_CLIENT_ID: ${{ secrets.KROGER_CLIENT_ID }}
          KROGER_CLIENT_SECRET: ${{ secrets.KROGER_CLIENT_SECRET }}
          KROGER_LOCATION_ID: ${{ inputs.location_id || secrets.KROGER_LOCATION_ID }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weekly-deals.json \
                  data/ingredient-prices.json \
                  data/deals-harris-teeter.json \
                  data/deals-ralphs.json \
                  data/deals-fred-meyer.json \
                  data/deals-smiths.json \
                  data/deals-frys.json \
                  data/deals-marianos.json \
                  data/deals-pick-n-save.json \
                  data/deals-city-market.json \
                  data/deals-qfc.json \
                  data/deals-metro-market.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update weekly deals for all chains [skip ci]"
            for attempt in 1 2 3; do
              if git push; then
                break
              fi

              if [ "$attempt" -eq 3 ]; then
                echo "Push failed after 3 attempts"
                exit 1
              fi

              echo "Push was rejected (non-fast-forward). Rebasing and retrying..."
              git fetch origin main
              git rebase origin/main
            done
          fi
