name: Generate Kroger Location Lookup

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CONFIRM to run the location lookup generation (uses ~2000 Kroger API calls)'
        required: true
        default: ''

jobs:
  generate-locations:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'CONFIRM'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate location lookup table
        env:
          KROGER_CLIENT_ID: ${{ secrets.KROGER_CLIENT_ID }}
          KROGER_CLIENT_SECRET: ${{ secrets.KROGER_CLIENT_SECRET }}
        run: node ./scripts/generate-location-lookup.mjs

      - name: Commit location lookup table
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/kroger-locations.json
          git diff --staged --quiet || git commit -m "chore: regenerate Kroger location lookup table [skip ci]"
          git push
