name: Generate Kroger Location Lookup

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CONFIRM to run the location lookup generation (uses ~2000 Kroger API calls)'
        required: true
        default: ''

jobs:
  generate-locations:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'CONFIRM'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate location lookup table
        env:
          KROGER_CLIENT_ID: ${{ secrets.KROGER_CLIENT_ID }}
          KROGER_CLIENT_SECRET: ${{ secrets.KROGER_CLIENT_SECRET }}
        run: node ./scripts/generate-location-lookup.mjs

      - name: Commit location lookup table
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/kroger-locations.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: regenerate Kroger location lookup table [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after 3 attempts"
              exit 1
            fi

            echo "Push was rejected (non-fast-forward). Rebasing and retrying..."
            git fetch origin main
            git rebase origin/main
          done
